<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOPA - الروابط الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            /* خلفية غنية بالألوان لتظهر تأثير الشفافية الزجاجي */
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 50%, #279f9f 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* تصميم الزجاج المائي (Glassmorphism) */
        .btn-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            border-radius: 24px; /* حواف دائرية ناعمة مثل الآيفون */
            text-decoration: none;
            color: white;
            font-weight: bold;
            
            /* الخصائص السحرية للشفافية */
            background: rgba(255, 255, 255, 0.1); /* شفافية بيضاء خفيفة */
            backdrop-filter: blur(15px); /* تمويه ما خلف الزجاج - أهم خاصية */
            -webkit-backdrop-filter: blur(15px); /* لدعم متصفح سفاري والآيفون */
            
            border: 1px solid rgba(255, 255, 255, 0.2); /* إطار خفيف جداً ليعطي حافة الزجاج */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .btn-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .full-width {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.15); /* تمييز بسيط للمنيو */
        }

        .icon-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 10px;
            /* ظل خفيف للأيقونة لتبدو طافية فوق الزجاج */
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .btn-card span {
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid white; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="main-content" class="container">
    <div class="loader"></div>
</div>

<script>
    const links = {
        "p1": "https://www.tiktok.com/@dopa.eg.1",
        "p2": "https://www.instagram.com/dopa.eg.1/",
        "p3": "./menu.pdf",
        "p4": "https://wa.me/201015319319",
        "p5": "https://www.facebook.com/share/1J3nmBNUtF/?mibextid=wwXIfr"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');
    const content = document.getElementById('main-content');

    if (targetId && links[targetId]) {
        window.location.href = links[targetId];
    } else {
        content.innerHTML = `
            <img src="logo.jpeg" class="logo-img" alt="DOPA">
            <h2 style="margin-bottom: 30px; font-size: 18px; font-weight: 400; opacity: 0.9;">Welcome to DOPA</h2>
            
            <div class="grid-container">
                <a href="menu.pdf" class="btn-card full-width">
                    <img src="./menu.png" class="icon-img">
                    <span>Menu</span>
                </a>

                <a href="${links.p1}" class="btn-card">
                    <img src="./tik-tok.png" class="icon-img">
                    <span>TikTok</span>
                 </a>

                <a href="${links.p2}" class="btn-card">
                    <img src="./instagram.png" class="icon-img">
                    <span>Instagram</span>
                </a>

                <a href="${links.p5}" class="btn-card">
                    <img src="./facebook.png" class="icon-img">
                    <span>Facebook</span>
                </a>

                <a href="${links.p4}" class="btn-card">
                    <img src="./whatsapp.png" class="icon-img">
                    <span>WhatsApp</span>
                </a>
            </div>
            <p style="margin-top: 40px; font-size: 11px; opacity: 0.5; letter-spacing: 1px;">MADE FOR DOPA LOVERS</p>
        `;
    }
</script>

</body>
</html>
