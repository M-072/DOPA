<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <p>جاري توجيهك إلى الوجهة المطلوبة...</p>
    </div>0

    <script>
        // هنا تضع الروابط الخاصة بك
        // الكلمة المفتاحية (slug) مقابل الرابط الطويل (URL)
        const links = {
            "p1": "https://www.tiktok.com/@dopa.eg.1", // TikTok
            "p2": "https://www.instagram.com/dopa.eg.1/", // Instagram
            "p3": "./menu.pdf", // Menu
            "p4": "https://wa.me/201015319319", // WhatsApp
            "p5": "https://www.facebook.com/share/1J3nmBNUtF/?mibextid=wwXIfr" // Facebook
        };

        // وظيفة الحصول على الكلمة من الرابط (مثال: mysite.com/?id=p1)
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');

        if (targetId && links[targetId]) {
            window.location.href = links[targetId];
        } else {
            // عرض أزرار في حال عدم وجود id في الرابط
            document.body.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h2>أهلاً بك في Dopa</h2>
                    <p>يرجى اختيار الوجهة:</p>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <a href="menu.pdf" style="padding: 10px; background: #3498db; color: white; text-decoration: none; border-radius: 5px;">قائمة الطعام (Menu)</a>
                        <a href="${links.p2}" style="padding: 10px; background: #e1306c; color: white; text-decoration: none; border-radius: 5px;">إنستجرام</a>
                        <a href="${links.p4}" style="padding: 10px; background: #25d366; color: white; text-decoration: none; border-radius: 5px;">واتساب</a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
